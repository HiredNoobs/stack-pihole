services:
  pihole:
    environment:
      FTLCONF_dns_upstreams: $PIHOLE_SECONDARY_DNS_UPSTREAMS
    deploy:
      mode: replicated
      replicas: $PIHOLE_SECONDARY_REPLICAS
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.${STACK}_pihole_secondary == 1
  unbound:
    deploy:
      mode: replicated
      replicas: $UNBOUND_SECONDARY_REPLICAS
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.${STACK}_unbound_secondary == 1
